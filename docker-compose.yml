version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:80"
    depends_on:
      - vector-db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000

  vector-db:
    image: redis:7
    ports:
      - "6379:6379"
